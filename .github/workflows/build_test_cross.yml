# Workflow for building and running tests.

name: Build/Test Cross
on:
  merge_group:
  push:
    branches:
      - main
      - v*.*.x
  pull_request:
    types: [opened, reopened, labeled, unlabeled, synchronize]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  SDE_ID: "813591"
  SDE_VERSION: "9.33.0-2024-01-07"

jobs:
  compile:
    name: Cross-compiling ${{ matrix.identifier }}
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'CI:none') }}
    runs-on: ${{ matrix.os || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        identifier: [armhf, i386, x64]
        include:
          - arch: armhf
            os: ubuntu-24.04-arm
            identifier: armhf
            test_in_pr: true
            build_target: arm-linux-gnueabihf

          - arch: i386
            identifier: i386
            test_in_pr: true
            build_target: i686-linux-gnu
            cflags: -m32

          - arch: i686
            identifier: x64
            test_in_pr: true
            cmake_args: >-
              -DJPEGXL_ENABLE_HWY_AVX3=true
              -DJPEGXL_ENABLE_HWY_AVX3_DL=true
              -DJPEGXL_ENABLE_HWY_AVX3_SPR=true
              -DJPEGXL_ENABLE_HWY_AVX3_ZEN4=true

    env:
      WILL_RUN_TESTS: ${{ (github.event_name == 'push' || (github.event_name == 'pull_request' && (matrix.test_in_pr || contains(github.event.pull_request.labels.*.name, 'CI:full')))) }}

    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
      with:
        egress-policy: audit

    - name: Checkout the source
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        submodules: true
        fetch-depth: 1
        persist-credentials: false

    - name: Install build deps
      run: |
        sudo ARCH=${{ matrix.arch }} BUILD_TARGET=${{ matrix.build_target }} \
          ./tools/scripts/install_deps.sh ${{ matrix.arch != 'i686' && '--cross' || ''}} build extras

    - name: Build
      run: |
        CC=clang CXX=clang++ \
        CFLAGS='${{ matrix.cflags }}' CXXFLAGS='${{ matrix.cflags }}' \
        BUILD_DIR=build BUILD_TARGET=${{ matrix.build_target }} \
        SKIP_TEST=1 TARGETS='all_tests cjxl djxl hwy_list_targets libjxl.so libjxl_dec.so' \
        ./ci.sh release \
          -DJPEGXL_FORCE_SYSTEM_BROTLI=ON \
          -DJPEGXL_ENABLE_JNI=OFF \
          ${{ matrix.cmake_args }}

    - name: Build stats
      run: |
        tools/scripts/build_stats.py --save build/stats.json \
          ${{ matrix.build_target && format('--binutils {0}-', matrix.build_target) || ''}} \
          --max-stack ${{ matrix.max_stack || '0' }} \
          cjxl djxl libjxl.so libjxl_dec.so

    - name: Prepare artefacts
      if: env.WILL_RUN_TESTS == 'true'
      run: |
        find ./build -regextype egrep -type f -regex '.*\.(a|h|jar|json|log|o)' -delete
        find ./build -type f -executable > executable.lst

    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: env.WILL_RUN_TESTS == 'true'
      with:
        name: cross_binary-${{ matrix.identifier }}
        path: |
          build/
          executable.lst
        retention-days: 1

  test:
    name: Testing ${{ matrix.identifier }} shard ${{ matrix.shard_number }}
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'CI:none') }}
    needs: compile
    runs-on: ${{ matrix.os || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        shard_number: [1, 2, 3, 4, 5, 6, 7, 8]
        identifier: [armhf, i386, x64]
        include:
          - arch: armhf
            os: ubuntu-24.04-arm
            identifier: armhf
            test_in_pr: true
            last_shard: 2

          - arch: i386
            identifier: i386
            test_in_pr: true
            last_shard: 2

          - arch: i686
            identifier: x64
            test_in_pr: true
            last_shard: 8

    env:
      UPLOAD_TEST_COST: false
      # Set to 1 for calculating test cost.
      LAST_SHARD: ${{ matrix.last_shard }}
      # Run the tests on push and when requested in pull_request.
      WILL_RUN_TESTS: ${{ (github.event_name == 'push' || (github.event_name == 'pull_request' && (matrix.test_in_pr || contains(github.event.pull_request.labels.*.name, 'CI:full')))) }}

    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
      with:
        egress-policy: audit

    - name: Checkout the source
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        submodules: true
        fetch-depth: 1
        persist-credentials: false

    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      if: (matrix.shard_number < env.LAST_SHARD) && (env.WILL_RUN_TESTS == 'true')
      with:
        name: cross_binary-${{ matrix.identifier }}

    - name: Install build deps
      if: (matrix.shard_number < env.LAST_SHARD) && (env.WILL_RUN_TESTS == 'true')
      run: |
        sudo ARCH=${{ matrix.arch }} \
          ./tools/scripts/install_deps.sh ${{ matrix.arch != 'i686' && '--cross' || ''}} extras_runtime runtime

    - name: Test ranging
      run: |
        mkdir -p ./build/Testing/Temporary
        unzip ./tools/scripts/test_cost-${{ matrix.identifier }}.zip -d ./build/Testing/Temporary
    
    - name: Prepare
      if: (env.UPLOAD_TEST_COST == 'true') && (matrix.shard_number == 0) && (env.WILL_RUN_TESTS == 'true')
      run: |
        rm build/Testing/Temporary/CTestCostData.txt

    - name: Cache SDE
      if: ${{ matrix.arch == 'i686' }}
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ${{ github.workspace }}/sde
        key: sde-${{ env.SDE_ID }}
    - name: Download SDE ${{ env.SDE_VERSION }}
      if: ${{ matrix.arch == 'i686' }}
      run: |
        mkdir -p sde
        cd sde
        SDE_ARCHIVE=sde.tar.xz
        if [ ! -f "${SDE_ARCHIVE}" ]; then
          curl -L --show-error -o "${SDE_ARCHIVE}" \
            https://downloadmirror.intel.com/${{ env.SDE_ID }}/sde-external-${{ env.SDE_VERSION }}-lin.tar.xz
        fi
        tar --strip-components=1 -xJf "${SDE_ARCHIVE}"
        cd ..

    - name: Test
      if: (matrix.shard_number < env.LAST_SHARD) && (env.WILL_RUN_TESTS == 'true')
      run: |
        EMULATOR=
        if [[ -n '${{ matrix.arch == 'i686' && 'true' || '' }}' ]]; then
          EMULATOR="sde/sde64 -spr --"
        fi

        chmod +x `cat executable.lst`
        BUILD_DIR=build \
        ${EMULATOR} ./ci.sh test \
          -I ${{ matrix.shard_number }},,${LAST_SHARD} \
          -E '(bash_test|conformance_tooling_test|test_jxl_jni_wrapper)'

    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      name: Upload test cost
      if: (env.UPLOAD_TEST_COST == 'true') && (matrix.shard_number == 0) && (env.WILL_RUN_TESTS == 'true')
      with:
        name: test_cost-${{ matrix.identifier }}
        path: |
          build/Testing/Temporary/CTestCostData.txt
        retention-days: 1

  # Compile-only s390x leg that guards #4627. squeeze.cc's big-endian, pre-1.2-Highway
  # branch is built nowhere else (the other legs use Highway >= 1.2), so this pins to 1.0.7.
  compile-s390x-old-highway:
    name: Cross-compiling s390x with Highway 1.0.7 (compile-only)
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'CI:none') }}
    runs-on: ubuntu-24.04-arm  # ports.ubuntu.com carries the s390x cross packages

    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
      with:
        egress-policy: audit

    - name: Checkout the source
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        submodules: true
        fetch-depth: 1
        persist-credentials: false

    - name: Pin Highway to 1.0.7
      run: |
        git -C third_party/highway fetch --depth 1 origin tag 1.0.7
        git -C third_party/highway checkout 1.0.7

    - name: Install build deps
      run: |
        sudo ARCH=s390x BUILD_TARGET=s390x-linux-gnu \
          ./tools/scripts/install_deps.sh --cross build

    - name: Build
      run: |
        CC=clang CXX=clang++ \
        BUILD_DIR=build BUILD_TARGET=s390x-linux-gnu \
        SKIP_TEST=1 TARGETS='libjxl.so libjxl_dec.so' \
        ./ci.sh release \
          -DBUILD_TESTING=OFF \
          -DJPEGXL_FORCE_SYSTEM_BROTLI=ON \
          -DJPEGXL_ENABLE_JNI=OFF \
          -DJPEGXL_ENABLE_TOOLS=OFF \
          -DJPEGXL_ENABLE_OPENEXR=OFF \
          -DJPEGXL_ENABLE_BENCHMARK=OFF
