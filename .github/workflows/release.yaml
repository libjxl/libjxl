# Workflow for building the release binaries.
#
# This workflow runs as a post-submit step, when pushing to main or the release
# branches (v*.*.x), and when creating a release in GitHub.
#
# In the GitHub release case, in addition to build the release binaries it also
# uploads the binaries to the given release automatically.

name: Release build / upload
on:
  merge_group:
  push:
    branches:
      - main
      - v*.*.x
  pull_request:
    types: [opened, reopened, labeled, unlabeled, synchronize]
    paths-ignore:
      - '**.md'
      - 'AUTHORS'
  release:
    types: [ published ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ubuntu_static_x86_64:
    name: linux x86_64 static
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'CI:none') }}
    runs-on: [ubuntu-latest]
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
      with:
        egress-policy: audit

    - name: Install build deps
      run: |
        sudo rm -f /var/lib/man-db/auto-update
        sudo apt update
        sudo apt install -y \
          asciidoc \
          clang \
          cmake \
          doxygen \
          graphviz \
          libbrotli-dev \
          libgdk-pixbuf2.0-dev \
          libgif-dev \
          libgtest-dev \
          libgtk2.0-dev  \
          libjpeg-dev \
          libopenexr-dev \
          libpng-dev \
          libwebp-dev \
          ninja-build \
          pkg-config \
          tarlz \
          xdg-utils \
        #
        echo "CC=clang" >> $GITHUB_ENV
        echo "CXX=clang++" >> $GITHUB_ENV

    - name: Checkout the source
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        submodules: true
        fetch-depth: 1
        persist-credentials: false

    - name: Build
      run: |
        SKIP_TEST=1 \
        ./ci.sh release \
          -DJPEGXL_DEP_LICENSE_DIR=/usr/share/doc \
          -DJPEGXL_STATIC=ON \
          -DBUILD_TESTING=OFF \
          -DJPEGXL_ENABLE_VIEWERS=OFF \
          -DJPEGXL_ENABLE_PLUGINS=OFF \
          -DJPEGXL_ENABLE_OPENEXR=OFF \
          -DJPEGXL_ENABLE_DEVTOOLS=ON \

    - name: Package release tarball
      run: |
        ROOT=`pwd`
        cd build
        tarlz -9cvf ${ROOT}/jxl-linux-x86_64-static.tar.lz \
          LICENSE* tools/{cjxl,djxl,benchmark_xl,jxlinfo,butteraugli_main,ssimulacra2}

    - name: Upload release tarball
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: jxl-linux-x86_64-static
        path: jxl-linux-x86_64-static.tar.lz
        archive: false



  # Build .deb packages Ubuntu/Debian
  release_ubuntu_pkg:
    name: .deb / ${{ matrix.os }}
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'CI:none') }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        os:
        - ubuntu:24.04
        - ubuntu:22.04
        - ubuntu:20.04
        - debian:bullseye
        - debian:bookworm
        - debian:trixie
        - debian:sid

    container:
      image: ${{ matrix.os }}

    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
      with:
        egress-policy: audit

    - name: Install build deps
      run: |
        rm -f /var/lib/man-db/auto-update
        apt update
        DEBIAN_FRONTEND=noninteractive apt install -y \
          build-essential \
          devscripts \
          python3 \
          sed \
        #

    - name: Calculate artifact suffix
      shell: python3 {0}
      run: |
        import os
        artifact_suffix="${{ matrix.os}}".replace(':', '-')
        open(os.getenv("GITHUB_ENV"), "a").write(f"ARTIFACT_SUFFIX={artifact_suffix}\n")

    - name: Set git safe dir
      run: |
        export GIT_CEILING_DIRECTORIES=/__w # only work before git v2.35.2
        git config --global --add safe.directory /__w/libjxl/libjxl

    - name: Checkout the source
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        submodules: true
        fetch-depth: 1
        persist-credentials: false

    - name: Stamp non-release versions
      # Stamps the built package with the commit date as part of the version
      # after the version number so newer release candidates can override older
      # ones.
      if: github.event_name != 'release'
      shell: 'bash'
      run: |
        # Committer timestamp.
        set -x
        commit_timestamp=$(git show -s --format=%ct)
        commit_datetime=$(date --utc "--date=@${commit_timestamp}" '+%Y%m%d%H%M%S')
        commit_ref=$(git rev-parse --short HEAD)
        sem_version=$(dpkg-parsechangelog --show-field Version)
        sem_version="${sem_version%%-*}"
        deb_version="${sem_version}~alpha${commit_datetime}-0+git${commit_ref}"
        dch -M --distribution unstable -b --newversion "${deb_version}" \
          "Stamping build with version ${deb_version}"

    - name: Stamp release versions
      # Mark the version as released
      if: github.event_name == 'release'
      shell: 'bash'
      run: |
        if head -n1 debian/changelog | grep UNRELEASED; then
          dch -M --distribution unstable --release ''
        fi

    - name: Configure hwy
      if: ${{ github.event_name == 'schedule' || github.event_name == 'release' || contains(github.event.pull_request.labels.*.name, 'CI:full') }}
      run: |
        echo "HWY_PKG_OPTIONS=" >> $GITHUB_ENV

    - name: Build hwy
      run: |
        apt build-dep -y ./third_party/highway
        ./ci.sh debian_build highway
        dpkg -i build/debs/libhwy-dev_*_amd64.deb

    - name: Build libjxl
      run: |
        apt build-dep -y .
        EXCLUDE_DEBIAN_PACKAGES="${{ matrix.exclude_debian_packages || '' }}" ./ci.sh debian_build jpeg-xl

    - name: Stats
      run: |
        ./ci.sh debian_stats

    - name: Package release tarball
      run: |
        ROOT=`pwd`
        cd build/debs/
        tar -cvf ${ROOT}/jxl-debs-amd64-${ARTIFACT_SUFFIX}.tar *jxl*.*

    - name: Upload release tarball
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: jxl-debs-amd64-${{ env.ARTIFACT_SUFFIX }}
        path: jxl-debs-amd64-${{ env.ARTIFACT_SUFFIX }}.tar
        archive: false


  windows_build:
    name: vcpkg / ${{ matrix.triplet }} ${{ matrix.build_type || 'Release'}}
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'CI:none') }}
    runs-on: [windows-latest]
    strategy:
      fail-fast: false
      matrix:
        include:
          - triplet: x86-windows-static
            arch: '-A Win32'
          - triplet: x64-windows-static
            arch: '-A x64'
            run_benchmark: true
          - triplet: x64-windows-static
            arch: '-A x64'
            build_type: Debug
            upload: 'OFF'
          - triplet: x86-windows
            arch: '-A Win32'
            static: 'OFF'
          - triplet: x64-windows
            arch: '-A x64'
            static: 'OFF'

    env:
      VCPKG_VERSION: '2025.10.17'
      VCPKG_ROOT: vcpkg
      VCPKG_DISABLE_METRICS: 1
      BUILD_TYPE: ${{ matrix.build_type || 'Release' }}
      PREFIX: ${{matrix.triplet}}

    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
      with:
        egress-policy: audit

    - name: Checkout the source
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        submodules: true
        fetch-depth: 2
        persist-credentials: false

    - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      if: github.event_name != 'release'
      id: cache-vcpkg
      with:
        path: vcpkg
        key: release-${{ runner.os }}-vcpkg-${{ env.VCPKG_VERSION }}-${{ matrix.triplet }}
        # TODO(eustas): remove when https://github.com/zizmorcore/zizmor/issues/2071 is fixed
        lookup-only: ${{ startsWith(github.ref, 'refs/tags/') }}

    - name: Download vcpkg
      if: github.event_name == 'release' || steps.cache-vcpkg.outputs.cache-hit != 'true'
      # wget doesn't seem to work under bash.
      shell: 'powershell'
      run: |
        C:\msys64\usr\bin\wget.exe -nv `
           https://github.com/microsoft/vcpkg/archive/refs/tags/${{ env.VCPKG_VERSION }}.zip `
          -O vcpkg.zip
    - name: Bootstrap vcpkg
      if: github.event_name == 'release' || steps.cache-vcpkg.outputs.cache-hit != 'true'
      shell: 'bash'
      run: |
        set -x
        unzip -q vcpkg.zip
        rm -rf ${VCPKG_ROOT}
        mv vcpkg-${VCPKG_VERSION} ${VCPKG_ROOT}
        ${VCPKG_ROOT}/bootstrap-vcpkg.sh

    - name: Install libraries with vcpkg
      shell: 'bash'
      run: |
        set -x
        ${VCPKG_ROOT}/vcpkg --triplet ${{ matrix.triplet }} install \
          giflib \
          libjpeg-turbo \
          libpng \
          libwebp \
          pkgconf \
        #

    - name: Configure
      shell: 'bash'
      run: |
        set -x
        mkdir build
        cmake -Bbuild -H. ${{ matrix.arch }} -T ClangCL \
          -DJPEGXL_STATIC=${{ matrix.static || 'ON'}} \
          -DJPEGXL_ENABLE_TOOLS='ON' \
          -DBUILD_TESTING=OFF \
          -DCMAKE_BUILD_TYPE=${BUILD_TYPE} \
          -DCMAKE_INSTALL_PREFIX=`pwd`/${PREFIX} \
          -DCMAKE_TOOLCHAIN_FILE=${VCPKG_ROOT}/scripts/buildsystems/vcpkg.cmake \
          -DJPEGXL_ENABLE_OPENEXR=OFF \
          -DJPEGXL_ENABLE_PLUGINS=OFF \
          -DJPEGXL_ENABLE_TCMALLOC=OFF \
          -DJPEGXL_ENABLE_VIEWERS=OFF \
          -DJPEGXL_ENABLE_DEVTOOLS='ON' \
          -DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }} \
          -DX_VCPKG_APPLOCAL_DEPS_INSTALL=${{ matrix.static == 'OFF' && 'ON' || 'OFF' }} \
        #
    - name: Build
      shell: 'bash'
      run: |
        set -x
        cmake --build build --config ${BUILD_TYPE}
    - name: Install
      shell: 'bash'
      run: |
        set -x
        cmake --build build --config ${BUILD_TYPE} --target install
        mkdir ${PREFIX}/licenses
        for pkg in giflib libjpeg-turbo libpng libwebp zlib; do
          cp vcpkg/installed/${{matrix.triplet}}/share/${pkg}/copyright \
            ${PREFIX}/licenses/LICENSE.${pkg}
        done
        cp third_party/sjpeg/COPYING ${PREFIX}/licenses/LICENSE.sjpeg
        cp third_party/skcms/LICENSE ${PREFIX}/licenses/LICENSE.skcms
        cp third_party/highway/LICENSE ${PREFIX}/licenses/LICENSE.highway
        cp third_party/brotli/LICENSE ${PREFIX}/licenses/LICENSE.brotli
        cp LICENSE ${PREFIX}/licenses/LICENSE.libjxl

    - name: Fast benchmark ${{ matrix.triplet }}
      shell: 'bash'
      if: matrix.run_benchmark && true
      run: |
        systeminfo | grep -A 1 Processor
        powershell -c "Get-CimInstance -ClassName Win32_Processor | Select-Object Name, NumberOfCores, NumberOfLogicalProcessors, MaxClockSpeed"
        mkdir tmp
        export TMPDIR=`pwd`/tmp
        export PATH=$PATH:`pwd`/build/lib
        BUILD_CONFIG=Release/ BENCHMARK_NUM_THREADS=2 STORE_IMAGES=0 ./ci.sh fast_benchmark

    - name: Package release
      shell: 'bash'
      if: matrix.upload != 'OFF'
      run: |
        7z -mx=9 -mfb=273 a jxl-${{matrix.triplet}}.7z ${PREFIX}/bin ${PREFIX}/include ${PREFIX}/lib ${PREFIX}/licenses
        7z -mm=Deflate64 -mfb=257 -mpass=15 -mtp=2 a jxl-${{matrix.triplet}}.zip ${PREFIX}/bin ${PREFIX}/include ${PREFIX}/lib ${PREFIX}/licenses

    - name: Upload ZIP release 
      if: matrix.upload != 'OFF'
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: jxl-${{matrix.triplet}}
        path: |
          jxl-${{matrix.triplet}}.zip
        archive: false

    - name: Upload 7Z release 
      if: matrix.upload != 'OFF'
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: jxl-${{matrix.triplet}}-7z
        path: |
          jxl-${{matrix.triplet}}.7z
        archive: false


  publish_release_assets:
    name: Publish release assets
    needs: [ubuntu_static_x86_64, release_ubuntu_pkg, windows_build]
    if: github.event_name == 'release'
    runs-on: [ubuntu-latest]
    permissions:
      contents: write

    steps:
    - name: Checkout the source
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        submodules: true
        fetch-depth: 1
        persist-credentials: false

    - name: Download all artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        path: release_assets
        skip-decompress: true
        merge-multiple: true

    - name: Publish assets
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_EVENT_RELEASE_TAG_NAME: ${{ github.event.release.tag_name }}
      run: |
        gh release upload ${GITHUB_EVENT_RELEASE_TAG_NAME} ./release_assets/*


  # Keep in sync with `publish_release_assets` workflow.
  dry_publish_release_assets:
    name: Publish release assets (dry run)
    needs: [ubuntu_static_x86_64, release_ubuntu_pkg, windows_build]
    if: github.event_name != 'release'
    runs-on: [ubuntu-latest]

    steps:
    - name: Checkout the source
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        submodules: true
        fetch-depth: 1
        persist-credentials: false

    - name: Download all artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        path: release_assets
        skip-decompress: true
        merge-multiple: true
